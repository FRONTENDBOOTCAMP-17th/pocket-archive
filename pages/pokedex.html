<!-- 포켓몬 상세 모달 -->
<div id="pokemon-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div id="pokemon-modal-overlay" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  
  <!-- 모달 wrapper - overflow visible 유지 -->
  <div class="relative z-10 w-full max-w-[789px] mx-4">

    <!-- 닫기 버튼 -->
    <button
      id="pokemon-modal-close"
      style="
        position: absolute;
        top: 15px;
        right: 15px;
        width: 30px;
        height: 30px;
        background: none;
        border: none;
        cursor: pointer;
        z-index: 9999;
        padding: 0;
        display: block;
      ">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" fill="#FF6B6B"/>
        <path d="M8.4 17L12 13.4L15.6 17L17 15.6L13.4 12L17 8.4L15.6 7L12 10.6L8.4 7L7 8.4L10.6 12L7 15.6L8.4 17ZM12 22C10.6167 22 9.31667 21.7375 8.1 21.2125C6.88333 20.6875 5.825 19.975 4.925 19.075C4.025 18.175 3.3125 17.1167 2.7875 15.9C2.2625 14.6833 2 13.3833 2 12C2 10.6167 2.2625 9.31667 2.7875 8.1C3.3125 6.88333 4.025 5.825 4.925 4.925C5.825 4.025 6.88333 3.3125 8.1 2.7875C9.31667 2.2625 10.6167 2 12 2C13.3833 2 14.6833 2.2625 15.9 2.7875C17.1167 3.3125 18.175 4.025 19.075 4.925C19.975 5.825 20.6875 6.88333 21.2125 8.1C21.7375 9.31667 22 10.6167 22 12C22 13.3833 21.7375 14.6833 21.2125 15.9C20.6875 17.1167 19.975 18.175 19.075 19.075C18.175 19.975 17.1167 20.6875 15.9 21.2125C14.6833 21.7375 13.3833 22 12 22ZM12 20C14.2333 20 16.125 19.225 17.675 17.675C19.225 16.125 20 14.2333 20 12C20 9.76667 19.225 7.875 17.675 6.325C16.125 4.775 14.2333 4 12 4C9.76667 4 7.875 4.775 6.325 6.325C4.775 7.875 4 9.76667 4 12C4 14.2333 4.775 16.125 6.325 17.675C7.875 19.225 9.76667 20 12 20Z" fill="white"/>
      </svg>
    </button>

    <!-- 모달 컨텐츠  -->
    <div id="pokemon-modal-content"></div>

  </div>
</div>
  <div
    class="flex flex-col lg:flex-row gap-10 w-full max-w-[1920px] mx-auto items-start p-5 animate-fadeIn"
  >
    <aside
      id="sidebarAccordion"
      class="w-full lg:w-[320px] bg-white rounded-[40px] shadow-xl flex flex-col lg:sticky lg:top-10 border border-gray-50 overflow-hidden order-1 transition-all"
    >
      <div
        onclick="window.toggleSidebar()"
        class="flex justify-between items-center cursor-pointer lg:cursor-default hover:bg-gray-50/50 lg:hover:bg-transparent transition-colors"
        style="user-select: none"
      >
        <h2
          class="text-2xl font-black text-[#05B29F] tracking-tight"
          style="
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 24px 24px 10px 24px;
          "
        >
          포켓몬 목록
        </h2>

        <div class="lg:hidden" style="padding-right: 24px">
          <span
            id="sidebarArrow"
            class="text-[#05B29F] text-xl transition-transform duration-300 inline-block"
          >
            ▼
          </span>
        </div>
      </div>

      <div
        id="sidebarContent"
        class="hidden lg:block border-t border-gray-50 lg:border-none"
      >
        <div class="p-8 pb-4">
          <div class="relative">
            <input
              type="text"
              id="sidebarSearch"
              placeholder="이름 또는 번호 검색"
              class="w-full p-4 pl-12 rounded-2xl bg-gray-50 border border-transparent outline-none focus:bg-white focus:ring-2 focus:ring-[#05B29F]/10 transition-all"
              style="padding-left: 24px"
            />
          </div>
        </div>
        <div
          id="sidebarList"
          class="flex-1 overflow-y-auto px-6 pb-8 custom-scrollbar space-y-1"
          style="height: 300px"
        ></div>
      </div>
    </aside>

    <section class="flex-1 w-full order-2">
      <div class="flex flex-col gap-12 pb-10">
        <div
          id="pokemonGrid"
          class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8"
        ></div>

        <div
          id="pokedexPagination"
          class="flex justify-center items-center gap-2"
        ></div>
      </div>
    </section>
  </div>
</div>
