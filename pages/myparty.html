<div class="flex flex-col gap-6 px-6 py-8 max-w-450 mx-auto max-[768px]:px-3 max-[768px]:py-5">
  <!-- 제목 -->
  <div class="flex flex-col text-left">
    <h1 class="text-3xl font-bold text-[#1a3a35]">나만의 파티 만들기</h1>
    <p class="text-sm text-[#5a8a82] mt-1">포획한 포켓몬 중 최대 6마리의 포켓몬을 선택하여 나만의 트레이너 카드를 만들어보세요</p>
  </div>

  <!-- 트레이너 카드 섹션 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <!-- 타이틀 -->
    <div class="flex items-center gap-2 px-8 pt-8 pb-6 max-[768px]:px-4 max-[768px]:pt-5 max-[768px]:pb-4">
      <span class="text-teal-400 text-lg">✦</span>
      <h2 class="text-2xl font-black text-slate-900">트레이너 카드 미리보기</h2>
    </div>

    <!-- 2열 → 모바일 1열 그리드 -->
    <div class="grid grid-cols-[1fr_280px] px-8 pb-8 max-[1024px]:grid-cols-1 max-[1024px]:px-5 max-[1024px]:pb-6 max-[768px]:px-4 max-[768px]:pb-5">
      <!-- 카드 미리보기 -->
      <div class="p-6 mr-8 rounded-2xl border border-[#f0fbf5] bg-[#f0fbf5af] max-[1024px]:mr-0 max-[1024px]:mb-5 max-[768px]:mb-4">
        <p class="text-sm font-medium text-slate-400 mb-4">선택된 포켓몬:</p>
        <div id="trainer-card-root"></div>
      </div>

      <!-- 오른쪽(모바일: 아래) 패널 -->
      <div class="flex flex-col gap-5">
        <!-- 버튼 -->
        <div class="flex gap-3">
          <button
            id="resetBtn"
            class="flex-1 flex items-center justify-center gap-1.5 border border-gray-200 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition px-4 py-2.5"
          >
            <span>↻</span> 초기화
          </button>
          <button id="saveBtn" class="flex-1 bg-teal-500 text-white rounded-xl text-sm font-semibold hover:bg-teal-600 transition px-4 py-2.5">
            완성
          </button>
        </div>

        <!-- 저장된 파티 -->
        <div>
          <div class="flex items-center justify-content-between pb-3 px-1">
            <span class="text-sm font-semibold text-slate-600 flex-1">저장된 나의 파티</span>
            <span id="preset-count" class="text-xs text-slate-400 bg-slate-100 rounded-full px-2 py-0.5">0 / 3</span>
          </div>
          <div id="preset-list" class="flex flex-col gap-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 북마크 포켓몬 섹션 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="flex justify-between items-center px-8 pt-8 pb-6 max-[768px]:px-4 max-[768px]:pt-5 max-[768px]:pb-4">
      <h2 class="text-2xl font-black text-slate-900">포획한 포켓몬 선택</h2>
      <span id="count" class="text-sm text-slate-400">0 / 6 선택됨</span>
    </div>

    <!-- 검색창 -->
    <div class="px-8 pb-4 max-[768px]:px-4">
      <input
        id="pokemon-search"
        type="text"
        placeholder="포켓몬 이름 또는 도감 번호로 검색"
        class="w-full rounded-xl border border-gray-200 text-sm text-slate-700 outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-100 transition px-4 py-3"
      />
    </div>

    <div
      class="h-150 overflow-y-auto px-8 pb-8 [scrollbar-width:thin] [scrollbar-color:#d1d5db_transparent] [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-thumb]:bg-gray-300 [&::-webkit-scrollbar-thumb]:rounded-full max-[1024px]:px-5 max-[1024px]:pb-6 max-[1024px]:h-125 max-[768px]:px-4 max-[768px]:pb-5 max-[768px]:h-100"
    >
      <div id="pokemon-list" class="grid grid-cols-4 gap-4 max-[1280px]:grid-cols-3 max-[768px]:grid-cols-2 max-[400px]:grid-cols-1"></div>
    </div>
  </div>
</div>
